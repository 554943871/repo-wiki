<svg xmlns="http://www.w3.org/2000/svg" width="960" height="408" viewBox="0 0 960 408" role="img" aria-labelledby="title desc">
  <title id="title">Whitebox Component Diagram: Fulfillment Module</title>
  <desc id="desc">Checkout Flow -&gt; Submit Fulfillment; Submit Fulfillment -&gt; Order Intake.Accept Request; Order Intake.Stock Need required Stock Reservation -&gt; Inventory Client.Reservation API provided Stock Reservation</desc>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1f2937" />
    </marker>
  </defs>
  <rect x="250" y="70" width="650" height="268" rx="8" fill="#ffffff" stroke="#1f2937" stroke-width="2" />
  <text x="575" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Fulfillment Module</text>
  <rect x="220" y="160" width="120" height="44" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
  <text x="280" y="187" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1e3a8a">Submit Fulfillment</text>
  <rect x="410" y="135" width="190" height="168" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="2" />
  <text x="505" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#334155">Order Intake</text>
  <rect x="436" y="189" width="138" height="34" rx="6" fill="#ecfdf5" stroke="#059669" stroke-width="2" />
  <text x="505" y="211" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#065f46">Accept Request</text>
  <rect x="436" y="237" width="138" height="34" rx="6" fill="#ecfdf5" stroke="#059669" stroke-width="2" />
  <text x="505" y="259" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#065f46">Stock Need</text>
  <line x1="436" y1="254" x2="416" y2="254" stroke="#6b7280" stroke-width="2" />
  <path data-interface-role="required" data-owner="order_intake" data-port="stock_need" data-interface="stock_reservation" d="M 416 244 A 10 10 0 0 0 416 264" fill="none" stroke="#b45309" stroke-width="2" />
  <text x="390" y="258" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#374151">Stock Reservation</text>
  <rect x="680" y="135" width="190" height="168" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="2" />
  <text x="775" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#334155">Inventory Client</text>
  <rect x="706" y="189" width="138" height="34" rx="6" fill="#ecfdf5" stroke="#059669" stroke-width="2" />
  <text x="775" y="211" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#065f46">Reservation API</text>
  <line x1="844" y1="206" x2="864" y2="206" stroke="#6b7280" stroke-width="2" />
  <circle data-interface-role="provided" data-owner="inventory_client" data-port="reservation_api" data-interface="stock_reservation" cx="874" cy="206" r="10" fill="#ffffff" stroke="#7c3aed" stroke-width="2" />
  <text x="890" y="210" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#374151">Stock Reservation</text>
  <rect x="60" y="150" width="130" height="64" rx="8" fill="#f9fafb" stroke="#4b5563" stroke-width="2" />
  <text x="125" y="187" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#111827">Checkout Flow</text>
  <line x1="190" y1="182" x2="220" y2="182" stroke="#1f2937" stroke-width="2" marker-end="url(#arrowhead)" />
  <text x="205" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">Checkout Flow -&gt; Submit Fulfillment</text>
  <text x="205" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#4b5563">submits fulfillment</text>
  <line x1="340" y1="182" x2="436" y2="206" stroke="#1f2937" stroke-width="2" marker-end="url(#arrowhead)" />
  <text x="388" y="127" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">Submit Fulfillment -&gt; Order Intake.Accept Request</text>
  <text x="388" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#4b5563">delegates request</text>
  <line x1="416" y1="254" x2="864" y2="206" stroke="#1f2937" stroke-width="2" marker-end="url(#arrowhead)" />
  <text x="640" y="133" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">Order Intake.Stock Need required Stock Reservation -&gt; Inventory Client.Reservation API provided Stock Reservation</text>
  <text x="640" y="336" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#4b5563">satisfies stock reservation</text>
</svg>
