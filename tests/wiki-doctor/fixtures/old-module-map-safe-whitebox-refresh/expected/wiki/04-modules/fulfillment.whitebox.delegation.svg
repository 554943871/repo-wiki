<svg xmlns="http://www.w3.org/2000/svg" width="960" height="528" viewBox="0 0 960 528" role="img" aria-labelledby="title desc">
  <title id="title">Delegation Derived Whitebox View: Fulfillment Module</title>
  <desc id="desc">Delegation Derived Whitebox View generated from the same Diagram Source Model; focuses on enclosing component boundary ports, internal part ports, and delegation connectors; Submit Fulfillment -&gt; Order Intake.Accept Request; Cancel Fulfillment -&gt; Cancellation Desk.Cancel Request; Fulfillment Status -&gt; Status Projector.Read Status</desc>
  <metadata data-derived-whitebox-view="delegation">Delegation Derived Whitebox View generated from the same Diagram Source Model; focuses on enclosing component boundary ports, internal part ports, and delegation connectors</metadata>
