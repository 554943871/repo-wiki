<svg xmlns="http://www.w3.org/2000/svg" width="960" height="720" viewBox="0 0 960 720" role="img" aria-labelledby="title desc">
  <title id="title">Interfaces Derived Whitebox View: Fulfillment Module</title>
  <desc id="desc">Interfaces Derived Whitebox View generated from the same Diagram Source Model; focuses on provided and required interface roles and interface assembly connectors; Order Intake.Stock Need required Stock Reservation -&gt; Inventory Client.Reservation API provided Stock Reservation; Order Intake.Label Need required Label Purchase -&gt; Carrier Client.Label API provided Label Purchase; Order Intake.Notify Need required Notification Dispatch -&gt; Notifier.Notification API provided Notification Dispatch</desc>
