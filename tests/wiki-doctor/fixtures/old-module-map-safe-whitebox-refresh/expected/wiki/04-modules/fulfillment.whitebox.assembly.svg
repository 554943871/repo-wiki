<svg xmlns="http://www.w3.org/2000/svg" width="1807" height="544" viewBox="0 0 1807 544" role="img" aria-labelledby="title desc">
  <title id="title">Assembly Derived Whitebox View: Fulfillment Module</title>
  <desc id="desc">Assembly Derived Whitebox View generated from the same Diagram Source Model; focuses on internal parts, internal part ports, and assembly connectors; Order Intake.Accept Request -&gt; Order Writer.Persistence API; Order Writer.Audit Feed -&gt; Audit Logger.Audit API</desc>
