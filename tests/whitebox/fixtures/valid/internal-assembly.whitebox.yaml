kind: whitebox_component_diagram
version: 1
component:
  id: checkout_module
  label: Checkout Module
  evidence:
    - path: tests/whitebox/fixtures/evidence/minimal-module.md
      note: Fixture evidence anchors this diagram fact.
  ports:
    - id: submit_order
      label: Submit Order
parts:
  - id: order_processor
    label: Order Processor
    ports:
      - id: accept_order
        label: Accept Order
  - id: payment_client
    label: Payment Client
    ports:
      - id: charge_payment
        label: Charge Payment
externals:
  - id: external_actor
    label: External Actor
connectors:
  - id: actor_submits_order
    type: external
    source:
      external: external_actor
    target:
      port: submit_order
    label: submits order
    evidence:
      - path: tests/whitebox/fixtures/evidence/minimal-module.md
        note: Fixture evidence anchors this diagram fact.
  - id: submit_order_to_processor
    type: delegation
    source:
      port: submit_order
    target:
      part_port:
        part: order_processor
        port: accept_order
    label: delegates submission
    evidence:
      - path: tests/whitebox/fixtures/evidence/minimal-module.md
        note: Fixture evidence anchors this diagram fact.
  - id: processor_charges_payment
    type: assembly
    source:
      part_port:
        part: order_processor
        port: accept_order
    target:
      part_port:
        part: payment_client
        port: charge_payment
    label: charges payment
    evidence:
      - path: tests/whitebox/fixtures/evidence/minimal-module.md
        note: Fixture evidence anchors this diagram fact.
