kind: whitebox_component_diagram
version: 1
component:
  id: checkout_module
  label: Checkout Module
  evidence:
  - path: tests/whitebox/fixtures/evidence/minimal-module.md
    lines: 1-4
    symbol: CheckoutModule
    note: File evidence with optional lines and symbol anchors the component.
  ports:
  - id: submit_order
    label: Submit Order
externals:
- id: external_actor
  label: External Actor
connectors:
- id: actor_submits_order
  type: external
  label: submits order
  evidence:
  - path: tests/whitebox/fixtures/evidence/minimal-module.md
    lines: '3'
    symbol: submit_order
    note: File evidence with a single line anchors the connector.
  from: external_actor
  to: checkout_module.submit_order
