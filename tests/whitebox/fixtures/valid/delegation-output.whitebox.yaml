kind: whitebox_component_diagram
version: 1
component:
  id: checkout_module
  label: Checkout Module
  evidence:
    - type: file
      path: tests/whitebox/fixtures/evidence/minimal-module.md
  ports:
    - id: order_events
      label: Order Events
parts:
  - id: event_publisher
    label: Event Publisher
    evidence:
      - type: file
        path: tests/whitebox/fixtures/evidence/minimal-module.md
    ports:
      - id: publish_event
        label: Publish Event
externals:
  - id: event_bus
    label: Event Bus
connectors:
  - id: module_publishes_events
    type: external
    source:
      port: order_events
    target:
      external: event_bus
    label: publishes events
    evidence:
      - type: file
        path: tests/whitebox/fixtures/evidence/minimal-module.md
  - id: publisher_to_order_events
    type: delegation
    source:
      part_port:
        part: event_publisher
        port: publish_event
    target:
      port: order_events
    label: exposes events
    evidence:
      - type: file
        path: tests/whitebox/fixtures/evidence/minimal-module.md
