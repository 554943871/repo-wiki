    label: Reserve API
    provides:
    - inventory_reservation
- id: payment_adapter
  label: Payment Adapter
  ports:
  - id: authorization_api
    label: Authorization API
    provides:
    - payment_authorization
- id: fraud_policy
  label: Fraud Policy
  ports:
  - id: screening_api
    label: Screening API
    provides:
    - fraud_screening
- id: order_writer
  label: Order Writer
  ports:
  - id: persistence_api
    label: Persistence API
  - id: audit_need
    label: Audit Need
    requires:
    - audit_event
- id: audit_logger
  label: Audit Logger
  ports:
  - id: audit_api
    label: Audit API
    provides:
    - audit_event
- id: notifier
  label: Notifier
  ports:
  - id: notification_api
    label: Notification API
    provides:
    - notification_dispatch
