    - order_submission
  - id: quote_request
    label: Quote Request
    requires:
    - pricing_quote
  - id: reserve_request
    label: Reserve Request
    requires:
    - inventory_reservation
  - id: payment_request
    label: Payment Request
    requires:
    - payment_authorization
  - id: fraud_request
    label: Fraud Request
    requires:
    - fraud_screening
  - id: notify_request
    label: Notify Request
    requires:
