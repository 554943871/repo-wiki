kind: whitebox_component_diagram
version: 1
interfaces:
- id: order_submission
  label: Order Submission
- id: pricing_quote
  label: Pricing Quote
- id: inventory_reservation
  label: Inventory Reservation
- id: payment_authorization
  label: Payment Authorization
- id: fraud_screening
  label: Fraud Screening
- id: fulfillment_command
  label: Fulfillment Command
- id: notification_dispatch
  label: Notification Dispatch
- id: audit_event
  label: Audit Event
- id: customer_profile
  label: Customer Profile
component:
  id: checkout_orchestrator
  label: Checkout Orchestrator
