<svg xmlns="http://www.w3.org/2000/svg" width="720" height="570" viewBox="0 0 720 570" role="img" aria-labelledby="title desc">
  <title id="title">Boundary Derived Whitebox View: Checkout Orchestrator</title>
  <desc id="desc">Boundary Derived Whitebox View generated from the same Diagram Source Model; focuses on external nodes, enclosing component boundary ports, and external connectors; Buyer App -&gt; Order Entry; Payment Gateway -&gt; Payment Status; Fulfillment Dispatch -&gt; Fulfillment Platform; Operations Console -&gt; Support Console</desc>
  <metadata data-derived-whitebox-view="boundary">Boundary Derived Whitebox View generated from the same Diagram Source Model; focuses on external nodes, enclosing component boundary ports, and external connectors</metadata>
  <text data-derived-view-title="boundary" x="360" y="26" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">Boundary Derived Whitebox View</text>
  <text data-derived-view-source="boundary" x="360" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#4b5563">Generated from the same Diagram Source Model</text>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1f2937" />
