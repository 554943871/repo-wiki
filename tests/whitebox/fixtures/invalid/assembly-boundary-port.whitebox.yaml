kind: whitebox_component_diagram
version: 1
component:
  id: checkout_module
  label: Checkout Module
  evidence:
    - type: file
      path: tests/whitebox/fixtures/evidence/minimal-module.md
  ports:
    - id: submit_order
      label: Submit Order
parts:
  - id: order_processor
    label: Order Processor
    ports:
      - id: accept_order
        label: Accept Order
externals:
  - id: external_actor
    label: External Actor
connectors:
  - id: actor_submits_order
    type: external
    source:
      external: external_actor
    target:
      port: submit_order
    evidence:
      - type: file
        path: tests/whitebox/fixtures/evidence/minimal-module.md
  - id: boundary_assembles_with_processor
    type: assembly
    source:
      port: submit_order
    target:
      part_port:
        part: order_processor
        port: accept_order
    evidence:
      - type: file
        path: tests/whitebox/fixtures/evidence/minimal-module.md
