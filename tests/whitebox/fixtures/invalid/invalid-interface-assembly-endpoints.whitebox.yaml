kind: whitebox_component_diagram
version: 1
interfaces:
- id: payment_authorization
  label: Payment Authorization
- id: inventory_reservation
  label: Inventory Reservation
component:
  id: checkout_module
  label: Checkout Module
  evidence:
  - path: tests/whitebox/fixtures/evidence/minimal-module.md
    note: Fixture evidence anchors this diagram fact.
  ports:
  - id: submit_order
    label: Submit Order
parts:
- id: order_processor
  label: Order Processor
  ports:
  - id: payment_need
    label: Payment Need
    requires:
    - payment_authorization
- id: payment_client
  label: Payment Client
  ports:
  - id: payment_api
    label: Payment API
    provides:
    - payment_authorization
    - inventory_reservation
externals:
- id: external_actor
  label: External Actor
connectors:
- id: actor_submits_order
  type: external
  evidence:
  - path: tests/whitebox/fixtures/evidence/minimal-module.md
    note: Fixture evidence anchors this diagram fact.
  from: external_actor
  to: checkout_module.submit_order
- id: port_to_port_interface_assembly
  type: interfaceAssembly
  evidence:
  - path: tests/whitebox/fixtures/evidence/minimal-module.md
    note: Fixture evidence anchors this diagram fact.
  from: order_processor.payment_need
  to: payment_client.payment_api
- id: whole_component_interface_assembly
  type: interfaceAssembly
  evidence:
  - path: tests/whitebox/fixtures/evidence/minimal-module.md
    note: Fixture evidence anchors this diagram fact.
  from: checkout_module
  to: payment_client
- id: mismatched_interface_assembly
  type: interfaceAssembly
  evidence:
  - path: tests/whitebox/fixtures/evidence/minimal-module.md
    note: Fixture evidence anchors this diagram fact.
  from:
    owner: order_processor
    port: payment_need
    interface: payment_authorization
    role: required
  to:
    owner: payment_client
    port: payment_api
    interface: inventory_reservation
    role: provided
