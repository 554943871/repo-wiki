kind: whitebox_component_diagram
version: 1
interfaces:
  - id: payment_authorization
    label: Payment Authorization
    operations:
      - authorize
component:
  id: checkout_module
  label: Checkout Module
  evidence:
    - path: tests/whitebox/fixtures/evidence/minimal-module.md
      note: Fixture evidence anchors this diagram fact.
  ports:
    - id: submit_order
      label: Submit Order
      requires:
        - missing_interface
